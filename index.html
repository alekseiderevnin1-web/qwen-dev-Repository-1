<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐟 3D Procedural Aquarium: AI Stress-Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            display: block;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            text-shadow: 0 0 10px rgba(0, 150, 255, 0.5);
            pointer-events: none;
            z-index: 100;
        }
        #info h1 {
            font-size: 24px;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #00d4ff, #0099ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #00d4ff;
            font-size: 20px;
            text-align: center;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0, 212, 255, 0.3);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
    
    <!-- Import Map для Three.js через ES Modules -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <div>Загрузка аквариума...</div>
    </div>
    
    <div id="info">
        <h1>🐟 3D Procedural Aquarium</h1>
        <p>AI Stress-Test: WebGL + GLSL Shaders</p>
        <p>• Вращение: ЛКМ | Панорама: ПКМ | Зум: Колесо</p>
        <p id="fps">FPS: --</p>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';

        // ============================================
        // ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ
        // ============================================
        let scene, camera, renderer, controls, composer;
        let waterMesh, sandMesh, fishArray = [];
        let godRays = [];
        let clock = new THREE.Clock();
        let frameCount = 0;
        let lastTime = performance.now();

        // Параметры воды для передачи в шейдеры
        const waterParams = {
            time: 0,
            wave1Freq: 0.5, wave1Amp: 0.15, wave1Speed: 1.2,
            wave2Freq: 0.8, wave2Amp: 0.08, wave2Speed: 0.9,
            wave3Freq: 1.3, wave3Amp: 0.05, wave3Speed: 1.5
        };

        // ============================================
        // ШЕЙДЕР ВОДЫ (Vertex + Fragment)
        // ============================================
        const waterVertexShader = `
            uniform float uTime;
            uniform float uWave1Freq, uWave1Amp, uWave1Speed;
            uniform float uWave2Freq, uWave2Amp, uWave2Speed;
            uniform float uWave3Freq, uWave3Amp, uWave3Speed;
            
            varying vec3 vPosition;
            varying vec3 vNormal;
            varying vec2 vUv;
            varying float vHeight;

            void main() {
                vUv = uv;
                vec3 pos = position;
                
                // Наложение 3 синусоид для создания динамического рельефа воды
                // Каждая волна имеет свою частоту, амплитуду и скорость
                float wave1 = sin(pos.x * uWave1Freq + uTime * uWave1Speed) * uWave1Amp;
                float wave2 = sin(pos.y * uWave2Freq + uTime * uWave2Speed) * uWave2Amp;
                float wave3 = sin((pos.x + pos.y) * uWave3Freq + uTime * uWave3Speed) * uWave3Amp;
                
                // Суммарное смещение вершин по оси Y
                float displacement = wave1 + wave2 + wave3;
                pos.y += displacement;
                
                vHeight = displacement;
                vPosition = pos;
                vNormal = normal;
                
                gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
            }
        `;

        const waterFragmentShader = `
            uniform vec3 uWaterColor;
            uniform vec3 uLightPos;
            
            varying vec3 vPosition;
            varying vec3 vNormal;
            varying vec2 vUv;
            varying float vHeight;

            // Функция расчета эффекта Френеля (изменение прозрачности под углом)
            float fresnel(vec3 viewDir, vec3 normal, float power) {
                return pow(1.0 - abs(dot(viewDir, normal)), power);
            }

            void main() {
                // Нормализация нормалей с учетом смещения
                vec3 normal = normalize(vNormal);
                
                // Расчет направления на камеру
                vec3 viewDir = normalize(cameraPosition - vPosition);
                
                // Эффект Френеля для реалистичной прозрачности кромок
                float fresnelEffect = fresnel(viewDir, normal, 2.5);
                
                // Specular highlights (блики от света)
                vec3 lightDir = normalize(uLightPos - vPosition);
                vec3 reflectDir = reflect(-lightDir, normal);
                float spec = pow(max(dot(viewDir, reflectDir), 0.0), 64.0);
                
                // Базовый цвет воды с градиентом от высоты волн
                vec3 baseColor = uWaterColor + vec3(vHeight * 2.0);
                
                // Смешивание: базовый цвет + френель + блики
                vec3 finalColor = mix(baseColor, vec3(0.8, 0.9, 1.0), fresnelEffect * 0.7);
                finalColor += vec3(spec) * 0.8;
                
                // Прозрачность зависит от угла просмотра (френель)
                float alpha = 0.6 + fresnelEffect * 0.3;
                
                gl_FragColor = vec4(finalColor, alpha);
            }
        `;

        // ============================================
        // ШЕЙДЕР ДНА С КАУСТИКАМИ
        // ============================================
        const sandVertexShader = `
            varying vec2 vUv;
            varying vec3 vPosition;
            
            void main() {
                vUv = uv;
                vPosition = position;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;

        const sandFragmentShader = `
            uniform float uTime;
            uniform float uCausticOffset;
            
            varying vec2 vUv;
            varying vec3 vPosition;

            // Процедурная генерация каустик через наложение синусоид
            // Каустики имитируют световые узоры от преломления через воду
            float caustics(vec2 uv, float time) {
                vec2 p = uv * 10.0;
                
                // Несколько слоев синусоид для создания сложного узора
                float c1 = sin(p.x * 0.5 + time * 0.3) * cos(p.y * 0.7 + time * 0.2);
                float c2 = sin(p.x * 0.8 - time * 0.4) * cos(p.y * 0.5 + time * 0.3);
                float c3 = sin((p.x + p.y) * 0.6 + time * 0.5);
                
                // Комбинирование слоев с разными фазами
                float causticPattern = (c1 + c2 + c3) / 3.0;
                
                // Усиление контраста и добавление яркости
                causticPattern = pow(causticPattern * 0.5 + 0.5, 2.0);
                
                return causticPattern;
            }

            // Процедурная текстура песка с шумом
            float sandNoise(vec2 uv) {
                vec2 i = floor(uv);
                vec2 f = fract(uv);
                f = f * f * (3.0 - 2.0 * f); // Smoothstep
                
                float n = dot(i, vec2(127.1, 311.7));
                float a = fract(sin(n) * 43758.5453);
                float b = fract(sin(n + 1.0) * 43758.5453);
                float c = fract(sin(n + 127.1) * 43758.5453);
                float d = fract(sin(n + 128.1) * 43758.5453);
                
                return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
            }

            void main() {
                // Генерация песчаной текстуры
                float noise1 = sandNoise(vUv * 50.0);
                float noise2 = sandNoise(vUv * 100.0 + 100.0);
                float sandTexture = mix(noise1, noise2, 0.5);
                
                // Цвет песка с вариациями
                vec3 sandColor = mix(vec3(0.76, 0.70, 0.50), vec3(0.65, 0.60, 0.55), sandTexture * 0.5);
                
                // Расчет каустик с динамическим смещением от волн
                float causticValue = caustics(vUv, uTime + uCausticOffset);
                
                // Наложение каустик на песок
                vec3 finalColor = sandColor + vec3(0.3, 0.4, 0.5) * causticValue * 0.6;
                
                gl_FragColor = vec4(finalColor, 1.0);
            }
        `;

        // ============================================
        // ШЕЙДЕР ДЛЯ ДЕФОРМАЦИИ РЫБ
        // ============================================
        const fishVertexShader = `
            uniform float uTime;
            uniform float uSwimSpeed;
            uniform int uFishId;
            
            varying vec3 vPosition;
            varying vec2 vUv;
            varying vec3 vNormal;

            void main() {
                vUv = uv;
                vNormal = normal;
                
                vec3 pos = position;
                
                // Волнообразное изгибание тела рыбы
                // Амплитуда изгиба возрастает от головы (x > 0) к хвосту (x < 0)
                float headTailFactor = smoothstep(0.5, -0.5, pos.x);
                float waveAmplitude = headTailFactor * 0.15;
                float waveFreq = 8.0;
                
                // Синусоидальная деформация по оси Z
                pos.z += sin(pos.x * waveFreq + uTime * uSwimSpeed + float(uFishId)) * waveAmplitude;
                
                // Дополнительное изгибание по оси Y для реалистичности
                pos.y += sin(pos.x * waveFreq * 0.5 + uTime * uSwimSpeed * 0.8) * waveAmplitude * 0.3;
                
                vPosition = pos;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
            }
        `;

        const fishFragmentShader = `
            uniform vec3 uFishColor;
            
            varying vec3 vPosition;
            varying vec2 vUv;
            varying vec3 vNormal;

            void main() {
                // Базовый цвет рыбы с градиентом
                vec3 color = uFishColor;
                
                // Добавление полосок/узоров
                float stripes = sin(vUv.x * 20.0) * 0.1 + 0.9;
                color *= stripes;
                
                // Освещение (упрощенное)
                vec3 lightDir = normalize(vec3(1.0, 1.0, 1.0));
                float diffuse = max(dot(vNormal, lightDir), 0.3);
                
                gl_FragColor = vec4(color * diffuse, 0.9);
            }
        `;

        // ============================================
        // ИНИЦИАЛИЗАЦИЯ СЦЕНЫ
        // ============================================
        function init() {
            // Создание сцены
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x001133);
            scene.fog = new THREE.FogExp2(0x001133, 0.02);

            // Камера
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(8, 5, 8);

            // Рендерер
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            // Контролы камеры
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.minDistance = 3;
            controls.maxDistance = 20;
            controls.target.set(0, 0, 0);

            // Освещение
            setupLighting();

            // Создание объектов
            createWater();
            createSand();
            createRocks();
            createGlass();
            createFish();
            createGodRays();

            // Постобработка
            setupPostProcessing();

            // Обработчики событий
            window.addEventListener('resize', onWindowResize);

            // Скрытие загрузочного экрана
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
            }, 1000);

            // Запуск анимации
            animate();
        }

        // ============================================
        // НАСТРОЙКА ОСВЕЩЕНИЯ
        // ============================================
        function setupLighting() {
            // DirectionalLight (солнце сверху) с тенями
            const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
            dirLight.position.set(5, 10, 5);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            dirLight.shadow.camera.near = 0.5;
            dirLight.shadow.camera.far = 50;
            dirLight.shadow.camera.left = -10;
            dirLight.shadow.camera.right = 10;
            dirLight.shadow.camera.top = 10;
            dirLight.shadow.camera.bottom = -10;
            scene.add(dirLight);

            // AmbientLight для общего освещения
            const ambientLight = new THREE.AmbientLight(0x406080, 0.5);
            scene.add(ambientLight);

            // Теплый PointLight внутри аквариума
            const pointLight = new THREE.PointLight(0xffaa00, 0.8, 20);
            pointLight.position.set(0, 2, 0);
            scene.add(pointLight);
        }

        // ============================================
        // СОЗДАНИЕ ВОДЫ
        // ============================================
        function createWater() {
            const geometry = new THREE.PlaneGeometry(12, 8, 128, 128);
            geometry.rotateX(-Math.PI / 2); // Поворот в горизонтальную плоскость

            const material = new THREE.ShaderMaterial({
                vertexShader: waterVertexShader,
                fragmentShader: waterFragmentShader,
                uniforms: {
                    uTime: { value: 0 },
                    uWave1Freq: { value: waterParams.wave1Freq },
                    uWave1Amp: { value: waterParams.wave1Amp },
                    uWave1Speed: { value: waterParams.wave1Speed },
                    uWave2Freq: { value: waterParams.wave2Freq },
                    uWave2Amp: { value: waterParams.wave2Amp },
                    uWave2Speed: { value: waterParams.wave2Speed },
                    uWave3Freq: { value: waterParams.wave3Freq },
                    uWave3Amp: { value: waterParams.wave3Amp },
                    uWave3Speed: { value: waterParams.wave3Speed },
                    uWaterColor: { value: new THREE.Color(0x006994) },
                    uLightPos: { value: new THREE.Vector3(5, 10, 5) }
                },
                transparent: true,
                side: THREE.DoubleSide,
                depthWrite: false
            });

            waterMesh = new THREE.Mesh(geometry, material);
            waterMesh.position.y = 3.5;
            waterMesh.receiveShadow = true;
            scene.add(waterMesh);
        }

        // ============================================
        // СОЗДАНИЕ ПЕСЧАНОГО ДНА
        // ============================================
        function createSand() {
            const geometry = new THREE.PlaneGeometry(12, 8, 64, 64);
            geometry.rotateX(-Math.PI / 2);

            const material = new THREE.ShaderMaterial({
                vertexShader: sandVertexShader,
                fragmentShader: sandFragmentShader,
                uniforms: {
                    uTime: { value: 0 },
                    uCausticOffset: { value: 0 }
                }
            });

            sandMesh = new THREE.Mesh(geometry, material);
            sandMesh.position.y = -2;
            sandMesh.receiveShadow = true;
            scene.add(sandMesh);
        }

        // ============================================
        // СОЗДАНИЕ КАМНЕЙ
        // ============================================
        function createRocks() {
            const rockColors = [0x888888, 0x777766, 0x666677, 0x998877, 0x778899];
            
            for (let i = 0; i < 12; i++) {
                // IcosahedronGeometry для базовой формы камня
                const geometry = new THREE.IcosahedronGeometry(0.3 + Math.random() * 0.5, 2);
                
                // Сдвиг вершин для создания природной формы (vertex noise)
                const positions = geometry.attributes.position;
                for (let j = 0; j < positions.count; j++) {
                    const x = positions.getX(j);
                    const y = positions.getY(j);
                    const z = positions.getZ(j);
                    
                    // Случайное смещение вершин
                    const noise = (Math.random() - 0.5) * 0.3;
                    const scale = 1 + noise;
                    
                    positions.setX(j, x * scale);
                    positions.setY(j, y * scale);
                    positions.setZ(j, z * scale);
                }
                geometry.computeVertexNormals();

                // Материал с вариациями roughness и metalness
                const material = new THREE.MeshStandardMaterial({
                    color: rockColors[Math.floor(Math.random() * rockColors.length)],
                    roughness: 0.7 + Math.random() * 0.3,
                    metalness: Math.random() * 0.2,
                    bumpScale: 0.02
                });

                const rock = new THREE.Mesh(geometry, material);
                
                // Случайная позиция на дне
                rock.position.set(
                    (Math.random() - 0.5) * 10,
                    -2 + (Math.random() * 0.3),
                    (Math.random() - 0.5) * 6
                );
                
                // Случайный поворот
                rock.rotation.set(
                    Math.random() * Math.PI,
                    Math.random() * Math.PI,
                    Math.random() * Math.PI
                );
                
                rock.castShadow = true;
                rock.receiveShadow = true;
                scene.add(rock);
            }
        }

        // ============================================
        // СОЗДАНИЕ СТЕКЛЯННЫХ СТЕНОК
        // ============================================
        function createGlass() {
            const glassGeometry = new THREE.BoxGeometry(12.2, 6, 8.2, 1, 1, 1);
            
            // Удаляем внутренние грани, оставляем только стенки
            const glassMaterial = new THREE.MeshPhysicalMaterial({
                color: 0xffffff,
                transparent: true,
                opacity: 0.15,
                roughness: 0.1,
                metalness: 0.1,
                transmission: 0.9,
                thickness: 0.5,
                envMapIntensity: 1.0,
                clearcoat: 1.0,
                clearcoatRoughness: 0.1,
                side: THREE.BackSide // Рендерим внутреннюю сторону
            });

            const glass = new THREE.Mesh(glassGeometry, glassMaterial);
            glass.position.y = 0.5;
            scene.add(glass);
        }

        // ============================================
        // СОЗДАНИЕ ПРОЦЕДУРНЫХ РЫБОК
        // ============================================
        function createFish() {
            const fishColors = [
                new THREE.Color(0xff6b35), // Оранжевая
                new THREE.Color(0x4ecdc4), // Бирюзовая
                new THREE.Color(0xffd93d), // Желтая
                new THREE.Color(0xff6b6b), // Красная
                new THREE.Color(0x6bcb77), // Зеленая
                new THREE.Color(0x4d96ff)  // Синяя
            ];

            for (let i = 0; i < 6; i++) {
                // Создание тела рыбы из деформированной сферы
                const bodyGeometry = new THREE.SphereGeometry(0.15, 32, 16);
                
                // Деформация для характерной формы рыбы (сужение к хвосту)
                const positions = bodyGeometry.attributes.position;
                for (let j = 0; j < positions.count; j++) {
                    const x = positions.getX(j);
                    const y = positions.getY(j);
                    const z = positions.getZ(j);
                    
                    // Сужение к хвосту (отрицательный X)
                    const taperFactor = Math.max(0.3, 1 - Math.abs(x + 0.2) * 1.5);
                    positions.setY(j, y * taperFactor);
                    positions.setZ(j, z * taperFactor);
                }
                bodyGeometry.computeVertexNormals();

                // Материал рыбы с шейдером для анимации
                const material = new THREE.ShaderMaterial({
                    vertexShader: fishVertexShader,
                    fragmentShader: fishFragmentShader,
                    uniforms: {
                        uTime: { value: 0 },
                        uSwimSpeed: { value: 1.5 + Math.random() * 0.5 },
                        uFishId: { value: i },
                        uFishColor: { value: fishColors[i % fishColors.length] }
                    },
                    transparent: true
                });

                const fish = new THREE.Mesh(bodyGeometry, material);

                // Создание хвостового плавника
                const tailGeometry = new THREE.PlaneGeometry(0.2, 0.15, 8, 4);
                const tailMaterial = new THREE.MeshBasicMaterial({
                    color: fishColors[i % fishColors.length],
                    side: THREE.DoubleSide,
                    transparent: true,
                    opacity: 0.9
                });
                const tail = new THREE.Mesh(tailGeometry, tailMaterial);
                tail.position.set(-0.25, 0, 0);
                tail.rotation.y = Math.PI / 4;
                fish.add(tail);

                // Создание спинного плавника
                const finGeometry = new THREE.PlaneGeometry(0.15, 0.1, 6, 3);
                const finMaterial = new THREE.MeshBasicMaterial({
                    color: fishColors[i % fishColors.length],
                    side: THREE.DoubleSide,
                    transparent: true,
                    opacity: 0.8
                });
                const fin = new THREE.Mesh(finGeometry, finMaterial);
                fin.position.set(0, 0.12, 0);
                fin.rotation.x = Math.PI / 3;
                fish.add(fin);

                // Настройка начальной позиции
                fish.position.set(
                    (Math.random() - 0.5) * 8,
                    -1 + Math.random() * 3,
                    (Math.random() - 0.5) * 5
                );

                // Создание пути движения (CatmullRomCurve3)
                const points = [];
                const numPoints = 5 + Math.floor(Math.random() * 3);
                for (let j = 0; j < numPoints; j++) {
                    points.push(new THREE.Vector3(
                        (Math.random() - 0.5) * 10,
                        -1 + Math.random() * 4,
                        (Math.random() - 0.5) * 7
                    ));
                }
                const curve = new THREE.CatmullRomCurve3(points, true, 'catmullrom', 0.5);
                
                // Сохранение данных о рыбе
                fish.userData = {
                    curve: curve,
                    progress: Math.random(),
                    speed: 0.002 + Math.random() * 0.003,
                    direction: Math.random() > 0.5 ? 1 : -1
                };

                fish.castShadow = true;
                scene.add(fish);
                fishArray.push(fish);
            }
        }

        // ============================================
        // СОЗДАНИЕ БОЖЕСТВЕННЫХ ЛУЧЕЙ (God Rays)
        // ============================================
        function createGodRays() {
            const rayGeometry = new THREE.ConeGeometry(0.5, 8, 16, 1, true);
            const rayMaterial = new THREE.MeshBasicMaterial({
                color: 0xffffff,
                transparent: true,
                opacity: 0.08,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                side: THREE.DoubleSide
            });

            for (let i = 0; i < 5; i++) {
                const ray = new THREE.Mesh(rayGeometry, rayMaterial.clone());
                ray.position.set(
                    (Math.random() - 0.5) * 6,
                    6,
                    (Math.random() - 0.5) * 4
                );
                ray.rotation.x = Math.PI;
                ray.scale.set(1 + Math.random(), 1, 1 + Math.random());
                ray.material.opacity = 0.05 + Math.random() * 0.08;
                
                scene.add(ray);
                godRays.push(ray);
            }
        }

        // ============================================
        // НАСТРОЙКА ПОСТОБРАБОТКИ
        // ============================================
        function setupPostProcessing() {
            composer = new EffectComposer(renderer);

            // RenderPass
            const renderPass = new RenderPass(scene, camera);
            composer.addPass(renderPass);

            // UnrealBloomPass для мягкого свечения
            const bloomPass = new UnrealBloomPass(
                new THREE.Vector2(window.innerWidth, window.innerHeight),
                0.4,  // strength
                0.5,  // radius
                0.85  // threshold
            );
            composer.addPass(bloomPass);

            // Depth of Field эмуляция через кастомный шейдер
            const dofShader = {
                uniforms: {
                    'tDiffuse': { value: null },
                    'focusDistance': { value: 0.5 },
                    'focusRange': { value: 0.3 }
                },
                vertexShader: `
                    varying vec2 vUv;
                    void main() {
                        vUv = uv;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform sampler2D tDiffuse;
                    uniform float focusDistance;
                    uniform float focusRange;
                    varying vec2 vUv;
                    
                    void main() {
                        vec4 color = texture2D(tDiffuse, vUv);
                        
                        // Простая эмуляция размытия по краям
                        float blurAmount = abs(vUv.y - 0.5) * 0.02;
                        
                        if (blurAmount > 0.001) {
                            vec4 sum = vec4(0.0);
                            sum += texture2D(tDiffuse, vUv + vec2(-2.0, -2.0) * blurAmount);
                            sum += texture2D(tDiffuse, vUv + vec2(-2.0, 2.0) * blurAmount);
                            sum += texture2D(tDiffuse, vUv + vec2(2.0, -2.0) * blurAmount);
                            sum += texture2D(tDiffuse, vUv + vec2(2.0, 2.0) * blurAmount);
                            sum += texture2D(tDiffuse, vUv + vec2(-1.0, 0.0) * blurAmount * 2.0);
                            sum += texture2D(tDiffuse, vUv + vec2(1.0, 0.0) * blurAmount * 2.0);
                            sum += texture2D(tDiffuse, vUv + vec2(0.0, -1.0) * blurAmount * 2.0);
                            sum += texture2D(tDiffuse, vUv + vec2(0.0, 1.0) * blurAmount * 2.0);
                            color = (color * 4.0 + sum) / 12.0;
                        }
                        
                        gl_FragColor = color;
                    }
                `
            };

            const dofPass = new ShaderPass(dofShader);
            composer.addPass(dofPass);
        }

        // ============================================
        // ОБРАБОТЧИК ИЗМЕНЕНИЯ РАЗМЕРА ОКНА
        // ============================================
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }

        // ============================================
        // АНИМАЦИОННЫЙ ЦИКЛ
        // ============================================
        function animate() {
            requestAnimationFrame(animate);

            const elapsedTime = clock.getElapsedTime();
            const delta = clock.getDelta();

            // Обновление параметров воды
            waterParams.time = elapsedTime;
            if (waterMesh) {
                waterMesh.material.uniforms.uTime.value = elapsedTime;
            }

            // Обновление каустик на дне (синхронизация с волнами)
            if (sandMesh) {
                const causticOffset = Math.sin(elapsedTime * 0.5) * 0.3 + 
                                     Math.cos(elapsedTime * 0.3) * 0.2;
                sandMesh.material.uniforms.uTime.value = elapsedTime;
                sandMesh.material.uniforms.uCausticOffset.value = causticOffset;
            }

            // Анимация рыб
            fishArray.forEach(fish => {
                if (fish.userData.curve) {
                    // Движение по кривой
                    fish.userData.progress += fish.userData.speed * fish.userData.direction;
                    
                    if (fish.userData.progress >= 1 || fish.userData.progress <= 0) {
                        fish.userData.direction *= -1;
                    }
                    
                    const point = fish.userData.curve.getPointAt(fish.userData.progress);
                    const tangent = fish.userData.curve.getTangentAt(fish.userData.progress);
                    
                    // Плавный поворот в направлении движения
                    fish.position.copy(point);
                    fish.lookAt(point.clone().add(tangent));
                    
                    // Обновление времени в шейдере для деформации
                    fish.material.uniforms.uTime.value = elapsedTime;
                }
            });

            // Анимация божественных лучей
            godRays.forEach((ray, index) => {
                ray.rotation.z = Math.sin(elapsedTime * 0.3 + index) * 0.1;
                ray.material.opacity = 0.05 + Math.sin(elapsedTime * 0.5 + index) * 0.03;
            });

            // Обновление контролов
            controls.update();

            // Рендеринг с постобработкой
            composer.render();

            // Подсчет FPS
            frameCount++;
            const currentTime = performance.now();
            if (currentTime - lastTime >= 1000) {
                document.getElementById('fps').textContent = `FPS: ${frameCount}`;
                frameCount = 0;
                lastTime = currentTime;
            }
        }

        // Запуск приложения
        init();
    </script>
</body>
</html>
